name: Sync Spotify LiteAPKs

on:
  schedule:
    - cron: '0 2,8,14 * * *' # GMT+7: 09:00, 15:00, 21:00
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch LiteAPKs Details
        id: liteapks
        run: |
          # 1. Configuration - Updated to the specific slug you provided
          APP_SLUG="spotify-2" 
          
          # 2. Get Post ID from Slug
          POST_ID=$(curl -s "https://liteapks.com/wp-json/wp/v2/posts?slug=$APP_SLUG" | jq -r '.[0].id')
          if [ "$POST_ID" == "null" ] || [ -z "$POST_ID" ]; then 
            echo "Error: App slug '$APP_SLUG' not found."
            exit 1
          fi
          
          # 3. Get App Details
          APP_JSON=$(curl -s "https://liteapks.com/wp-json/v2/posts/$POST_ID")
          VERSION=$(echo $APP_JSON | jq -r '.data.versions[0].version')
          DL_LINK=$(echo $APP_JSON | jq -r '.data.versions[0].version_downloads[0].version_download_link')
          PUBLISHER=$(echo $APP_JSON | jq -r '.data.publisher // "LiteAPKs"')
          TITLE=$(echo $APP_JSON | jq -r '.data.title // "Spotify"')
          
          # 4. Generate the exact Double-Base64 Token (Dart logic)
          # Logic: b64(utf8(b64(utf8(timestamp + 10800))))
          TOKEN=$(node -e "
            const ts = (Math.floor(Date.now() / 1000) + 10800).toString();
            const step1 = Buffer.from(ts).toString('base64');
            const step2 = Buffer.from(step1).toString('base64');
            console.log(Buffer.from(step2).toString('base64').replace(/=/g, '%3D'));
          ")
          
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_ENV
          echo "FINAL_DL_URL=$DL_LINK?token=$TOKEN" >> $GITHUB_ENV
          echo "NOTES=Publisher: $PUBLISHER | Source: LiteAPKs ($TITLE)" >> $GITHUB_ENV

      - name: Download and Rename APK
        run: |
          # Download using the required Referer and save as 'Spotify.apk' (removes versioning)
          curl -L -H "Referer: https://liteapks.com/$APP_SLUG.html" "$FINAL_DL_URL" -o Spotify.apk
          
          # Basic validation: ensure file isn't empty
          if [ ! -s Spotify.apk ]; then
            echo "Error: Downloaded file is empty."
            exit 1
          fi

      - name: Create New Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ env.VERSION_TAG }}" >/dev/null 2>&1; then
            echo "Version ${{ env.VERSION_TAG }} already exists. Skipping."
          else
            gh release create "${{ env.VERSION_TAG }}" \
              --title "Spotify ${{ env.VERSION_TAG }}" \
              --notes "${{ env.NOTES }}" \
              Spotify.apk
          fi

      - name: Cleanup Old Releases (Keep latest 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 | awk 'NR > 5 {print $1}' | xargs -I {} gh release delete {} --yes --cleanup-tag || true
