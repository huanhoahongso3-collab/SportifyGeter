name: Sync Spotify Revanced

on:
  schedule:
    # GMT+7 09:00 -> UTC 02:00
    # GMT+7 15:00 -> UTC 08:00
    # GMT+7 21:00 -> UTC 14:00
    - cron: '0 2,8,14 * * *'
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Process APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_REPO="haidayne/APK-MOD"
          TAG="Spotifyrevanced"
          
          echo "Fetching asset list from $SOURCE_REPO..."
          
          # Corrected command: gh release view
          FILE_NAME=$(gh release view $TAG -R $SOURCE_REPO --json assets --jq '.assets[].name' | grep -E "Spotify_.*\.apk" | sort -V | tail -n 1)
          
          if [ -z "$FILE_NAME" ]; then
            echo "Error: No matching APK file found in the release."
            exit 1
          fi
          
          echo "Found latest file: $FILE_NAME"
          
          # Download the specific asset
          gh release download $TAG -R $SOURCE_REPO -p "$FILE_NAME" --clobber
          
          # Rename to Spotify.apk
          mv "$FILE_NAME" Spotify.apk
          
          # Extract version for the new tag (vX.X.X.X)
          VERSION_TAG="v$(echo $FILE_NAME | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')"
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

      - name: Create New Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if this version already exists in YOUR repo
          if gh release view "${{ env.VERSION_TAG }}" >/dev/null 2>&1; then
            echo "Version ${{ env.VERSION_TAG }} already exists in this repo. Skipping upload."
          else
            echo "Creating new release: ${{ env.VERSION_TAG }}"
            gh release create "${{ env.VERSION_TAG }}" \
              --title "Spotify Revanced ${{ env.VERSION_TAG }}" \
              --notes "Automated sync from $SOURCE_REPO" \
              Spotify.apk
          fi
