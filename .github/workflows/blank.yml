name: Sync Spotify LiteAPKs

on:
  schedule:
    - cron: '0 2,8,14 * * *'
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch and Process
        id: liteapks
        run: |
          APP_SLUG="spotify-2"
          
          # 1. Get Post ID
          POST_ID=$(curl -s "https://liteapks.com/wp-json/wp/v2/posts?slug=$APP_SLUG" | jq -r '.[0].id')
          
          # 2. Get App Data
          APP_JSON=$(curl -s "https://liteapks.com/wp-json/v2/posts/$POST_ID")
          
          # 3. Versioning
          RAW_VERSION=$(echo $APP_JSON | jq -r '.data.versions[0].version')
          CLEAN_VERSION=$(echo $RAW_VERSION | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
          
          # 4. Correct Triple-Base64 Token Logic (Matching Dart Source)
          # b64(utf8(b64(utf8(b64(utf8(timestamp))))))
          TOKEN=$(node -e "
            const ts = (Math.floor(Date.now() / 1000) + 10800).toString();
            const b64 = (str) => Buffer.from(str).toString('base64');
            const finalToken = b64(b64(b64(ts)));
            console.log(finalToken.replace(/=/g, '%3D'));
          ")

          echo $APP_JSON | jq -c '.data.versions[0].version_downloads' > downloads.json
          echo "VERSION_TAG=v$CLEAN_VERSION" >> $GITHUB_ENV
          echo "RAW_VERSION=$RAW_VERSION" >> $GITHUB_ENV
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Download and Clean
        run: |
          mkdir -p dist
          echo "--- Download Log ---" > dist/log.txt
          
          cat downloads.json | jq -c '.[]' | while read i; do
            URL=$(echo $i | jq -r '.version_download_link')
            
            # Use Node to handle decoding to avoid shell character issues
            CLEAN_NAME=$(node -e "console.log(decodeURIComponent('$URL').split('/').pop())")
            
            echo "Processing: $CLEAN_NAME" >> dist/log.txt
            
            # The Dart code uses the standardUrl as the Referer via the '#' fragment logic
            # Standard URL: https://liteapks.com/spotify-2.html
            curl -L -v \
              -H "Referer: https://liteapks.com/spotify-2.html" \
              -H "User-Agent: Mozilla/5.0 (Android 14; Mobile; rv:128.0) Gecko/128.0 Firefox/128.0" \
              "$URL?token=$TOKEN" -o "dist/$CLEAN_NAME" 2>> dist/log.txt
            
            # Verify if the downloaded file is actually an APK (not an 'Access denied' text file)
            FILE_TYPE=$(file "dist/$CLEAN_NAME")
            echo "File Verification: $FILE_TYPE" >> dist/log.txt
          done

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ env.VERSION_TAG }}" >/dev/null 2>&1; then
            gh release upload "${{ env.VERSION_TAG }}" dist/* --clobber
          else
            gh release create "${{ env.VERSION_TAG }}" \
              --title "Spotify ${{ env.RAW_VERSION }}" \
              --notes "Automated sync from LiteAPKs" \
              dist/*
          fi
