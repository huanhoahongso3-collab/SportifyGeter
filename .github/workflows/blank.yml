name: Sync Spotify Revanced

on:
  schedule:
    # GMT+7 09:00 -> UTC 02:00
    # GMT+7 15:00 -> UTC 08:00
    # GMT+7 21:00 -> UTC 14:00
    - cron: '0 2,8,14 * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Latest File from Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. List assets from the specific tag in the source repo
          # 2. Filter for .apk files and sort to get the latest version (v9.x...)
          # 3. Download the specific file
          
          SOURCE_REPO="haidayne/APK-MOD"
          TAG="Spotifyrevanced"
          
          FILE_NAME=$(gh asset list -R $SOURCE_REPO $TAG --json name --jq '.[].name' | grep -E "Spotify_.*\.apk" | sort -V | tail -n 1)
          
          if [ -z "$FILE_NAME" ]; then
            echo "No matching APK file found."
            exit 1
          fi
          
          echo "Found latest file: $FILE_NAME"
          gh release download $TAG -R $SOURCE_REPO -p "$FILE_NAME" --clobber
          
          # Rename to Spotify.apk
          mv "$FILE_NAME" Spotify.apk
          
          # Extract version for the new tag (e.g., from Spotify_9.1.12.226.apk -> v9.1.12.226)
          VERSION_TAG="v$(echo $FILE_NAME | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')"
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

      - name: Create New Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if the release/tag already exists in YOUR repo to avoid duplicates
          if gh release view ${{ env.VERSION_TAG }} >/dev/null 2>&1; then
            echo "Release ${{ env.VERSION_TAG }} already exists. Skipping."
          else
            gh release create ${{ env.VERSION_TAG }} \
              --title "Spotify Revanced ${{ env.VERSION_TAG }}" \
              --notes "Automated sync from haidayne/APK-MOD" \
              Spotify.apk
          fi
