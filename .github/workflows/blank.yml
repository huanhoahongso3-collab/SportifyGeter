name: Sync & Sign Spotify Revanced

on:
  schedule:
    - cron: '0 2,8,14 * * *' # 09:00, 15:00, 21:00 GMT+7
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download and Process APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_REPO="haidayne/APK-MOD"
          TAG="Spotifyrevanced"
          
          # Fetch the latest file name
          FILE_NAME=$(gh release view $TAG -R $SOURCE_REPO --json assets --jq '.assets[].name' | grep -E "Spotify_.*\.apk" | sort -V | tail -n 1)
          
          if [ -z "$FILE_NAME" ]; then
            echo "Error: No matching APK file found."
            exit 1
          fi
          
          # Extract version (e.g., v9.1.12.226)
          VERSION_TAG="v$(echo $FILE_NAME | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          
          # IMPORTANT: Check if this version already exists in your repo first
          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Version $VERSION_TAG already exists. Stopping to prevent override."
            exit 0
          fi

          # If it doesn't exist, proceed with download
          gh release download $TAG -R $SOURCE_REPO -p "$FILE_NAME" --clobber
          
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
          echo "ORIGINAL_FILE=$FILE_NAME" >> $GITHUB_ENV

      - name: Sign APK
        if: env.VERSION_TAG != ''
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
          KEY_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # Reconstruct the .p12 file
          echo "$KEY_STORE_BASE64" | base64 -d > release-key.p12
          
          # Sign the APK
          /usr/local/lib/android/sdk/build-tools/latest/apksigner sign \
            --ks release-key.p12 \
            --ks-pass pass:"$KEY_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --out Spotify.apk \
            "${{ env.ORIGINAL_FILE }}"

      - name: Create New Release
        if: env.VERSION_TAG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.VERSION_TAG }}" \
            --title "Spotify Revanced ${{ env.VERSION_TAG }}" \
            --notes "Automated sync from haidayne/APK-MOD. Signed as my own key." \
            Spotify.apk
